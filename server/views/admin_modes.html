<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rítmika — Gestor de Catálogo</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Paytone+One&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

  <script>
    // Leer token del query string (ej: /admin?token=miclave)
    const ADMIN_TOKEN = new URLSearchParams(window.location.search).get('token') || '';

    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Paytone One"', 'sans-serif'],
            body: ['Fredoka', 'sans-serif'],
          },
          colors: {
            dark: '#0f172a',
            brutal: '#111827',
            accentY: '#ffe600',
            accentC: '#00e5ff',
            accentM: '#f0047f',
            accentP: '#ec4899',
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #0f172a;
      background-image: radial-gradient(circle at 50% 50%, rgba(255,230,0,0.05) 0%, transparent 60%);
      color: white;
      font-family: 'Fredoka', sans-serif;
    }

    .brutal-box {
      background-color: white;
      color: #111827;
      border: 4px solid #111827;
      box-shadow: 6px 6px 0px #111827;
    }

    .brutal-input {
      background-color: #f1f5f9;
      border: 3px solid #111827;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
      width: 100%;
    }
    
    .brutal-input:focus {
      outline: none;
      border-color: #f0047f;
      box-shadow: inset 0 0 0 2px #f0047f;
    }

    .brutal-btn {
      font-family: 'Paytone One', sans-serif;
      text-transform: uppercase;
      border: 4px solid #111827;
      box-shadow: 4px 4px 0px #111827;
      cursor: pointer;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
    }

    .brutal-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0px 0px 0px #111827;
    }

    .brutal-btn.primary { background-color: #ffe600; color: #111827; }
    .brutal-btn.secondary { background-color: #00e5ff; color: #111827; }

    #toast {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #10b981;
      color: white;
      border: 4px solid #111827;
      box-shadow: 6px 6px 0px #111827;
      padding: 1rem 2rem;
      font-family: 'Paytone One', sans-serif;
      border-radius: 8px;
      z-index: 1000;
    }

    /* Custom Checkbox */
    .cb-brutal {
      appearance: none;
      width: 1.5rem;
      height: 1.5rem;
      border: 3px solid #111827;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      position: relative;
    }
    .cb-brutal:checked {
      background: #f0047f;
    }
    .cb-brutal:checked::after {
      content: '✔';
      position: absolute;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      top: -2px;
      left: 2px;
    }
    
    .table-container {
      max-height: 60vh;
      overflow-y: auto;
    }
  </style>
</head>
<body class="min-h-screen p-8">

  <div class="max-w-6xl mx-auto">
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
      <div>
        <h1 class="font-display text-4xl md:text-5xl text-accentY drop-shadow-[4px_4px_0_rgba(17,24,39,1)]" style="-webkit-text-stroke: 2px #111827;">
          🎤 GESTOR DE CATÁLOGO
        </h1>
        <p class="font-body text-xl mt-2 text-slate-300">Asigna canciones a tus Modos de Juego</p>
      </div>
      <div class="text-right">
        <span class="bg-brutal text-white px-3 py-1 rounded-full text-sm font-bold tracking-widest uppercase">
          Total: <span id="total-count">0</span> canciones
        </span>
      </div>
    </header>

    <!-- Toolbar: Buscador y Acciones Bulk -->
    <div class="brutal-box p-6 rounded-2xl mb-8 flex flex-col md:flex-row gap-6 items-end">
      <div class="flex-1 w-full">
        <label class="block font-display text-sm mb-2 text-accentM">Buscar por Artista o Canción:</label>
        <input type="text" id="search-input" class="brutal-input text-lg" placeholder="Ej: My Chemical Romance..." onkeyup="filterTable()">
      </div>

      <div class="w-full md:w-auto">
        <label class="block font-display text-sm mb-2 text-accentC">Asignar MODO a las <span id="selected-count" class="text-accentM">0</span> seleccionadas:</label>
        <div class="flex gap-2">
          <select id="bulk-mode-select" class="brutal-input bg-white cursor-pointer w-48">
            <option value="clasico">Clásico (Por defecto)</option>
            <option value="anime">Modo Anime</option>
            <option value="emo">Modo Emo</option>
            <option value="ranchera">Dolidas y Rancheras</option>
            <option value="nostalgia">Nostalgia 2000s</option>
          </select>
          <button onclick="applyBulkMode()" class="brutal-btn primary whitespace-nowrap">
            Aplicar
          </button>
        </div>
      </div>
    </div>

    <!-- Tabla de Canciones -->
    <div class="brutal-box rounded-2xl overflow-hidden">
      <div class="table-container bg-white">
        <table class="w-full text-left border-collapse">
          <thead class="bg-slate-200 sticky top-0 z-10 border-b-4 border-brutal">
            <tr>
              <th class="p-3 w-16 text-center border-r-2 border-brutal">
                <input type="checkbox" id="select-all" class="cb-brutal" onchange="toggleSelectAll(this)">
              </th>
              <th class="p-3 font-display text-lg text-brutal border-r-2 border-brutal">Artista</th>
              <th class="p-3 font-display text-lg text-brutal border-r-2 border-brutal">Título</th>
              <th class="p-3 font-display text-lg text-brutal border-r-2 border-brutal">Género (Global)</th>
              <th class="p-3 font-display text-lg text-accentM">Modo de Juego</th>
            </tr>
          </thead>
          <tbody id="table-body" class="text-brutal font-semibold text-lg divide-y-2 divide-brutal">
            <tr>
              <td colspan="5" class="p-8 text-center text-slate-500">Cargando base de datos...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast">✅ ¡ACTUALIZADO CON ÉXITO!</div>

  <script>
    let allSongs = [];
    let filteredSongs = [];
    const tableBody = document.getElementById('table-body');
    const searchInput = document.getElementById('search-input');
    const selectedCountSpan = document.getElementById('selected-count');
    const totalCountSpan = document.getElementById('total-count');

    // Mapeo amigable de modos para mostrar en la tabla
    const modeNames = {
      '': '<span class="text-slate-400 font-normal">Clásico</span>',
      'clasico': '<span class="text-slate-400 font-normal">Clásico</span>',
      'anime': '🌸 Anime',
      'emo': '🖤 Emo',
      'ranchera': '🥃 Dolidas/Ranchera',
      'nostalgia': '💿 Nostalgia 2000s'
    };

    async function loadData() {
      try {
        const res = await fetch('/api/songs?limit=5000');
        allSongs = await res.json();
        filteredSongs = [...allSongs];
        totalCountSpan.textContent = allSongs.length;
        renderTable();
      } catch (err) {
        console.error("Error al cargar canciones", err);
        tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-red-500">Error al cargar la base de datos.</td></tr>';
      }
    }

    function renderTable() {
      tableBody.innerHTML = '';
      if(filteredSongs.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-500">No se encontraron resultados.</td></tr>';
        return;
      }

      // Para optimizar renderizado de muchos miles, creamos un DocumentFragment
      const fragment = document.createDocumentFragment();

      // Renderizar máximo 500 para evitar lag extremo en búsqueda, si hay más, avisamos
      const renderLimit = Math.min(filteredSongs.length, 500);

      for(let i=0; i<renderLimit; i++) {
        const song = filteredSongs[i];
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-100 transition-colors";
        
        const modeBadge = modeNames[song.mode] || `<span class="bg-slate-800 text-white px-2 py-1 rounded text-sm">${song.mode}</span>`;

        tr.innerHTML = `
          <td class="p-3 text-center border-r-2 border-brutal">
            <input type="checkbox" class="cb-brutal row-cb" value="${song.id}" onchange="updateSelectedCount()">
          </td>
          <td class="p-3 border-r-2 border-brutal cursor-pointer text-accentM hover:underline" onclick="selectArtist('${song.artist.replace(/'/g, "\\'")}')" title="Clic para ver todas las de ${song.artist}">
            ${song.artist}
          </td>
          <td class="p-3 border-r-2 border-brutal">${song.title}</td>
          <td class="p-3 border-r-2 border-brutal uppercase text-sm">${song.genre || '-'}</td>
          <td class="p-3">${modeBadge}</td>
        `;
        fragment.appendChild(tr);
      }

      if(filteredSongs.length > 500) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="5" class="p-4 text-center text-slate-500 bg-slate-50">Mostrando los primeros 500 resultados. Usa el buscador para refinar.</td>`;
        fragment.appendChild(tr);
      }

      tableBody.appendChild(fragment);
      updateSelectedCount();
      document.getElementById('select-all').checked = false;
    }

    function filterTable() {
      const q = searchInput.value.toLowerCase().trim();
      if(!q) {
        filteredSongs = [...allSongs];
      } else {
        filteredSongs = allSongs.filter(s => 
          s.title.toLowerCase().includes(q) || 
          s.artist.toLowerCase().includes(q)
        );
      }
      renderTable();
    }

    function selectArtist(artistName) {
      searchInput.value = artistName;
      filterTable();
    }

    function toggleSelectAll(cb) {
      const checkboxes = document.querySelectorAll('.row-cb');
      checkboxes.forEach(c => c.checked = cb.checked);
      updateSelectedCount();
    }

    function updateSelectedCount() {
      const count = document.querySelectorAll('.row-cb:checked').length;
      selectedCountSpan.textContent = count;
    }

    async function applyBulkMode() {
      const checkboxes = document.querySelectorAll('.row-cb:checked');
      if(checkboxes.length === 0) {
        alert("¡Selecciona al menos una canción primero!");
        return;
      }

      const songIds = Array.from(checkboxes).map(c => c.value);
      let selectedMode = document.getElementById('bulk-mode-select').value;
      if (selectedMode === 'clasico') selectedMode = ''; // Clásico = sin filtro de modo

      try {
        const res = await fetch('/api/songs/bulk-mode', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'x-admin-token': ADMIN_TOKEN },
          body: JSON.stringify({ songIds, mode: selectedMode })
        });
        const data = await res.json();
        
        if(data.success) {
          // Actualizar estado local
          songIds.forEach(id => {
            const s = allSongs.find(song => song.id === id);
            if(s) s.mode = selectedMode;
          });
          renderTable();
          showToast();
        } else {
          alert("Error: " + data.error);
        }
      } catch (err) {
        console.error(err);
        alert("Fallo de red al intentar actualizar.");
      }
    }

    function showToast() {
      const toast = document.getElementById('toast');
      anime({
        targets: toast,
        bottom: '30px',
        opacity: 1,
        duration: 800,
        easing: 'easeOutElastic(1, .5)',
        complete: function() {
          setTimeout(() => {
            anime({
              targets: toast,
              bottom: '-100px',
              opacity: 0,
              duration: 500,
              easing: 'easeInBack'
            });
          }, 3000);
        }
      });
    }

    // Arrancar
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
