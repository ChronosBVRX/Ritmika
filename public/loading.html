<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritmika Loading</title>
    <script src="libs/tailwind.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700;800;900&family=Paytone+One&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Fredoka', sans-serif;
        }

        .paytone { font-family: 'Paytone One', sans-serif; }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
        }

        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loading-text {
            color: #fff;
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 4px 4px 0px #111827, 0 0 20px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            margin-bottom: 20px;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { color: #fff; text-shadow: 4px 4px 0px #111827, 0 0 10px rgba(255,255,255,0.2); }
            100% { color: #ffe600; text-shadow: 4px 4px 0px #111827, 0 0 30px rgba(255,230,0,0.6); }
        }

        /* Premium Cyber Progress Bar */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .cyber-loader {
            width: 300px;
            height: 8px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .cyber-loader::before {
            content: '';
            position: absolute;
            top: 0; left: 0; height: 100%; width: 40%;
            background: linear-gradient(90deg, transparent, #00e5ff, transparent);
            animation: scan-bar 1s ease-in-out infinite;
        }

        @keyframes scan-bar {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        .pct-text {
            color: #00e5ff;
            font-family: 'Paytone One', sans-serif;
            font-size: 1.5rem;
            text-shadow: 2px 2px 0px #111827, 0 0 15px rgba(0,229,255,0.6);
        }

        .bottom-hint {
            position: absolute;
            bottom: 2rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            text-shadow: 2px 2px 0px #111827, -2px -2px 0px #111827, 2px -2px 0px #111827, -2px 2px 0px #111827;
            background: rgba(17, 24, 39, 0.4);
            padding: 8px 16px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="assets/loading_bg.mp4" type="video/mp4">
    </video>

    <div class="content-layer">
        <div class="loading-text paytone">
            PREPARANDO LA FIESTA
        </div>
        
        <div class="loader-container">
            <div class="cyber-loader"></div>
            <div class="pct-text" id="pct-display">0%</div>
        </div>
    </div>

    <div class="bottom-hint">
        F11 pantalla completa &nbsp;&middot;&nbsp; ESC salir
    </div>

    <script>
        // Animación falsa de porcentaje para darle un toque premium "real" a la pantalla de carga primaria
        let pct = 0;
        const pctEl = document.getElementById('pct-display');
        const interval = setInterval(() => {
            pct += Math.floor(Math.random() * 5) + 1;
            if(pct >= 99) { 
                pct = 99; 
                clearInterval(interval); 
            }
            pctEl.textContent = pct + '%';
        }, 120);
    </script>
</body>
</html>
